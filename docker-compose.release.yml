# Release compose (GHCR images).
# Default image tag tracks latest; override with GUNGNR_VERSION=vX.Y.Z for a pin.
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notes}
      POSTGRES_DB: ${POSTGRES_DB:-notes}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # DB host publishing is disabled by default.
    # Enable loopback-only publish with:
    #   docker compose -f docker-compose.release.yml -f docker-compose.db-host-loopback.yml up -d
    networks:
      - core

  api:
    image: ghcr.io/hrafngud/gungnr-api:${GUNGNR_VERSION:-latest}
    environment:
      APP_ENV: ${APP_ENV:-local}
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://notes:notes@db:5432/notes?sslmode=disable}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-20}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME_MIN: ${DB_CONN_MAX_LIFETIME_MIN:-30}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SUPERUSER_GH_NAME: ${SUPERUSER_GH_NAME:-}
      SUPER_GH_ID: ${SUPER_GH_ID:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_TEMPLATE_OWNER: ${GITHUB_TEMPLATE_OWNER:-Hrafngud}
      GITHUB_TEMPLATE_REPO: ${GITHUB_TEMPLATE_REPO:-go-ground}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-}
      GITHUB_REPO_PRIVATE: ${GITHUB_REPO_PRIVATE:-true}
      TEMPLATES_DIR: ${TEMPLATES_DIR:-/templates}
      DOMAIN: ${DOMAIN:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
      CLOUDFLARE_TUNNEL_ID: ${CLOUDFLARE_TUNNEL_ID:-}
      CLOUDFLARED_CONFIG: ${CLOUDFLARED_CONFIG:-}
      CLOUDFLARED_TUNNEL_NAME: ${CLOUDFLARED_TUNNEL_NAME:-}
      INFRA_QUEUE_ROOT: ${INFRA_QUEUE_ROOT:-/templates/.infra}
      INFRA_POLL_INTERVAL_MS: ${INFRA_POLL_INTERVAL_MS:-500}
      INFRA_RESULT_TIMEOUT_SEC: ${INFRA_RESULT_TIMEOUT_SEC:-120}
      INFRA_RETENTION_INTENT_HOURS: ${INFRA_RETENTION_INTENT_HOURS:-168}
      INFRA_RETENTION_RESULT_HOURS: ${INFRA_RETENTION_RESULT_HOURS:-168}
      INFRA_RETENTION_CLAIM_MINUTES: ${INFRA_RETENTION_CLAIM_MINUTES:-60}
      DB_HOST_PUBLISH_MODE: ${DB_HOST_PUBLISH_MODE:-disabled}
      DB_HOST_PUBLISH_HOST: ${DB_HOST_PUBLISH_HOST:-127.0.0.1}
      DB_HOST_PUBLISH_PORT: ${DB_HOST_PUBLISH_PORT:-5432}
      DOCKER_NETWORK_GUARDRAILS_MODE: ${DOCKER_NETWORK_GUARDRAILS_MODE:-enforced}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - core
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${TEMPLATES_DIR:-/templates}:${TEMPLATES_DIR:-/templates}
      - ${CLOUDFLARED_DIR:-/home/user/.cloudflared}:${CLOUDFLARED_DIR:-/home/user/.cloudflared}
    # Port mapping removed for production exposure; keep if needed for local debugging
    # ports:
    #   - "${API_PORT:-8080}:8080"

  web:
    image: ghcr.io/hrafngud/gungnr-web:${GUNGNR_VERSION:-latest}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - core
    # Port mapping removed for production; keep if needed locally
    # ports:
    #   - "${WEB_PORT:-4173}:80"

  proxy:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"  # Only this port needs to be exposed on the host for Cloudflare Tunnel
    depends_on:
      - web
      - api
    networks:
      - edge
      - core

networks:
  # Hardened default: deny inter-container communication on bridge networks.
  # Compatibility fallback for engines/drivers that reject this option:
  #   docker compose -f docker-compose.release.yml -f docker-compose.network-compat.yml up -d
  edge:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"
  core:
    driver: bridge
    internal: true
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"

volumes:
  pgdata:
