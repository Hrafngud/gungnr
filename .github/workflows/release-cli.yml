name: Release Artifacts

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  RELEASE_VERSION: ${{ github.ref_name }}

jobs:
  build-cli:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI artifact
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GUNGNR_VERSION: ${{ env.RELEASE_VERSION }}
          OUTPUT: dist/gungnr_${{ matrix.goos }}_${{ matrix.goarch }}
        run: ./scripts/build_gungnr.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gungnr-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/gungnr_${{ matrix.goos }}_${{ matrix.goarch }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    needs: build-cli
    permissions:
      contents: write

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: gungnr-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum gungnr_* > checksums.txt

      - name: Create or update release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ env.RELEASE_VERSION }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --verify-tag \
              --notes "Automated CLI release artifacts for $TAG_NAME."
          fi

          gh release upload "$TAG_NAME" \
            dist/gungnr_linux_amd64 \
            dist/gungnr_linux_arm64 \
            dist/gungnr_darwin_amd64 \
            dist/gungnr_darwin_arm64 \
            dist/checksums.txt \
            --clobber

  publish-images:
    name: Publish GHCR ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    needs: build-cli
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: gungnr-api
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build_args: ""
          - image_name: gungnr-web
            context: ./frontend/go-notes
            dockerfile: ./frontend/go-notes/Dockerfile
            build_args: |
              VITE_API_BASE_URL=/

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ env.RELEASE_VERSION }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: ${{ matrix.build_args }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
