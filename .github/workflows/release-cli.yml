name: Release CLI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-cli:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI artifact
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GUNGNR_VERSION: ${{ github.ref_name }}
          OUTPUT: dist/gungnr_${{ matrix.goos }}_${{ matrix.goarch }}
        run: ./scripts/build_gungnr.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gungnr-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/gungnr_${{ matrix.goos }}_${{ matrix.goarch }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    needs: build-cli

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: gungnr-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum gungnr_* > checksums.txt

      - name: Create or update release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --verify-tag \
              --notes "Automated CLI release artifacts for $TAG_NAME."
          fi

          gh release upload "$TAG_NAME" \
            dist/gungnr_linux_amd64 \
            dist/gungnr_linux_arm64 \
            dist/gungnr_darwin_amd64 \
            dist/gungnr_darwin_arm64 \
            dist/checksums.txt \
            --clobber
